<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#060810">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="MDK Combat Clock">
<link rel="manifest" href="manifest.json">
<title>MDK COMBAT CLOCK</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}

:root{
  --accent:#00ff99;
  --accent2:#00ccff;
  --glow:rgba(0,255,153,0.45);
  --glow2:rgba(0,204,255,0.3);
  --dim-accent:rgba(0,255,153,0.12);
  --red:#ff2255;
  --amber:#ffbb00;
  --amber-glow:rgba(255,187,0,0.5);
  --bg:#060810;
  --panel:#0b0f1a;
  --panel2:#0f1422;
  --border:#1a2535;
  --border2:#243040;
  --dim:#2a3a50;
  --text:#b0c8e0;
  --text2:#6a8aaa;
}

body.t-blue   {--accent:#00cfff;--accent2:#00ffcc;--glow:rgba(0,207,255,0.45);--glow2:rgba(0,255,204,0.3);--dim-accent:rgba(0,207,255,0.12);--bg:#040810;--panel:#070c18;--panel2:#0a1020;--border:#101e32;--border2:#1a2840;--dim:#203050;--text:#90c0e0;--text2:#507090;}
body.t-amber  {--accent:#ffcc00;--accent2:#ff8800;--glow:rgba(255,204,0,0.45);--glow2:rgba(255,136,0,0.3);--dim-accent:rgba(255,204,0,0.12);--bg:#0c0800;--panel:#140f00;--panel2:#1a1400;--border:#2a1e00;--border2:#382800;--dim:#4a3400;--text:#d8c090;--text2:#907050;}
body.t-red    {--accent:#ff3366;--accent2:#ff8833;--glow:rgba(255,51,102,0.45);--glow2:rgba(255,136,51,0.3);--dim-accent:rgba(255,51,102,0.12);--bg:#0f0408;--panel:#180610;--panel2:#200818;--border:#300818;--border2:#401020;--dim:#501828;--text:#d890a0;--text2:#906070;}
body.t-white  {--accent:#e8f0ff;--accent2:#a0c0ff;--glow:rgba(232,240,255,0.35);--glow2:rgba(160,192,255,0.25);--dim-accent:rgba(232,240,255,0.08);--bg:#040404;--panel:#0c0c0e;--panel2:#101014;--border:#202028;--border2:#282830;--dim:#303040;--text:#c0c8d8;--text2:#808898;}
body.t-cyan   {--accent:#00ffee;--accent2:#00aaff;--glow:rgba(0,255,238,0.45);--glow2:rgba(0,170,255,0.3);--dim-accent:rgba(0,255,238,0.12);--bg:#020c0c;--panel:#041414;--panel2:#061a1a;--border:#083030;--border2:#0c3c3c;--dim:#104848;--text:#90d8d0;--text2:#508878;}
body.t-violet {--accent:#cc88ff;--accent2:#ff66cc;--glow:rgba(204,136,255,0.45);--glow2:rgba(255,102,204,0.3);--dim-accent:rgba(204,136,255,0.12);--bg:#080610;--panel:#100a18;--panel2:#140e20;--border:#200e30;--border2:#2a1240;--dim:#381850;--text:#c0a0d8;--text2:#806098;}

html,body{width:100%;height:100%;height:100dvh;background:var(--bg);color:var(--text);font-family:'Share Tech Mono',monospace;overflow:hidden;touch-action:none;-webkit-tap-highlight-color:transparent;}

/* Scanlines overlay */
body::after{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.06) 2px,rgba(0,0,0,0.06) 4px);pointer-events:none;z-index:9990;}

/* Logo watermark */
#logoWm{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none;z-index:0;}
#logoWm img{width:min(65vw,65vh);height:auto;opacity:0.06;filter:saturate(0) brightness(2);user-select:none;-webkit-user-drag:none;}

#app{width:100vw;height:100dvh;display:flex;flex-direction:column;position:relative;z-index:1;}

/* ============ CORNER DECORATION ============ */
.corner{position:absolute;width:20px;height:20px;pointer-events:none;}
.corner-tl{top:0;left:0;border-top:2px solid var(--accent);border-left:2px solid var(--accent);opacity:0.6;}
.corner-tr{top:0;right:0;border-top:2px solid var(--accent);border-right:2px solid var(--accent);opacity:0.6;}
.corner-bl{bottom:0;left:0;border-bottom:2px solid var(--accent);border-left:2px solid var(--accent);opacity:0.6;}
.corner-br{bottom:0;right:0;border-bottom:2px solid var(--accent);border-right:2px solid var(--accent);opacity:0.6;}

/* ============ TITLE BAR ============ */
.title-bar{
  display:flex;align-items:center;justify-content:center;gap:8px;
  padding:5px 14px 4px;
  border-bottom:1px solid var(--border);
  font-family:'Rajdhani',sans-serif;font-weight:700;
  font-size:clamp(13px,3.5vw,20px);
  letter-spacing:3px;text-transform:uppercase;
  color:var(--text2);
  position:relative;flex-shrink:0;
}
.title-accent{color:var(--accent);text-shadow:0 0 12px var(--glow);}
.title-sep{color:var(--dim);font-size:0.7em;}

/* ============ CLOCK MODE ============ */
#clockMode{display:flex;flex-direction:column;width:100%;height:100%;padding:6px 14px;}

.clock-top{display:flex;justify-content:space-between;align-items:center;padding-bottom:4px;border-bottom:1px solid var(--border);flex-shrink:0;}
.date-display{font-family:'Rajdhani',sans-serif;font-size:clamp(12px,3vw,18px);color:var(--accent);letter-spacing:2px;text-transform:uppercase;transition:color 0.4s;}
.top-right{display:flex;align-items:center;gap:10px;}

.wake-indicator{font-size:clamp(8px,1.6vw,10px);color:var(--dim);letter-spacing:2px;display:flex;align-items:center;gap:4px;transition:color 0.4s;}
.wake-indicator.on{color:var(--accent);}
.wake-dot{width:5px;height:5px;background:currentColor;border-radius:50%;flex-shrink:0;}
.wake-indicator.on .wake-dot{box-shadow:0 0 5px currentColor;animation:blink 2s ease-in-out infinite;}
.status-dot{width:7px;height:7px;background:var(--accent);border-radius:50%;box-shadow:0 0 8px var(--accent);animation:blink 2s ease-in-out infinite;transition:all 0.4s;}

@keyframes blink{0%,100%{opacity:1}50%{opacity:0.15}}

.clock-main{flex:1;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:10px;min-height:0;}

.big-time{
  font-family:'Orbitron',monospace;font-weight:900;
  font-size:clamp(76px,26vw,230px);
  color:var(--accent);
  text-shadow:0 0 40px var(--glow),0 0 80px var(--dim-accent);
  letter-spacing:4px;line-height:0.95;user-select:none;
  transition:color 0.4s,text-shadow 0.4s;
}
@media(orientation:landscape){.big-time{font-size:clamp(76px,40vh,240px);}}

.seconds-bar{width:88%;max-width:560px;height:3px;background:var(--border);border-radius:2px;overflow:hidden;}
.seconds-fill{height:100%;background:var(--accent);box-shadow:0 0 6px var(--accent);transition:width 0.9s linear,background 0.4s,box-shadow 0.4s;}

.efemerides{flex-shrink:0;border-top:1px solid var(--border);padding-top:4px;display:flex;flex-direction:column;gap:1px;}
.efem-label{font-size:clamp(7px,1.6vw,10px);color:var(--text2);letter-spacing:3px;text-transform:uppercase;}
.efem-text{font-family:'Rajdhani',sans-serif;font-size:clamp(10px,2.4vw,15px);color:var(--amber);letter-spacing:1px;line-height:1.3;}
.efem-none{font-size:clamp(9px,2vw,12px);color:var(--dim);font-style:italic;}

.clock-bottom{display:flex;justify-content:space-between;align-items:center;padding-top:5px;border-top:1px solid var(--border);flex-shrink:0;gap:8px;min-height:44px;padding-bottom:max(5px,env(safe-area-inset-bottom));}
.bottom-left{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}

.hourly-toggle{display:flex;align-items:center;gap:6px;font-size:clamp(8px,1.6vw,11px);color:var(--text2);cursor:pointer;user-select:none;padding:5px 9px;border:1px solid var(--border);border-radius:4px;transition:all 0.2s;min-height:36px;}
.hourly-toggle.active{color:var(--amber);border-color:var(--amber);}
.toggle-dot{width:8px;height:8px;border-radius:50%;border:2px solid currentColor;position:relative;flex-shrink:0;}
.hourly-toggle.active .toggle-dot::after{content:'';position:absolute;inset:1px;background:var(--amber);border-radius:50%;}

.btn-icon{font-family:'Share Tech Mono',monospace;font-size:clamp(8px,1.6vw,11px);letter-spacing:1px;color:var(--text2);background:transparent;border:1px solid var(--border);padding:5px 10px;border-radius:4px;cursor:pointer;transition:all 0.2s;user-select:none;min-height:36px;}
.btn-icon:active{transform:scale(0.94);}
.btn-icon:hover{border-color:var(--border2);color:var(--text);}

.btn-combat{
  font-family:'Orbitron',monospace;font-weight:700;
  font-size:clamp(9px,2vw,14px);letter-spacing:3px;text-transform:uppercase;
  color:#fff;background:var(--red);border:none;
  padding:10px 20px;border-radius:5px;cursor:pointer;
  box-shadow:0 0 20px rgba(255,34,85,0.5),0 0 40px rgba(255,34,85,0.2);
  transition:all 0.15s;user-select:none;flex-shrink:0;min-height:40px;
}
.btn-combat:active{transform:scale(0.95);}

/* ============ THEME PANEL ============ */
#themePanel{display:none;position:fixed;bottom:65px;left:50%;transform:translateX(-50%);z-index:1000;background:var(--panel2);border:1px solid var(--border2);border-radius:12px;padding:14px 18px;gap:10px;flex-direction:column;align-items:center;box-shadow:0 8px 50px rgba(0,0,0,0.9);}
#themePanel.open{display:flex;}
.theme-label{font-size:9px;color:var(--text2);letter-spacing:3px;text-transform:uppercase;}
.theme-swatches{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;}
.swatch{width:36px;height:36px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:all 0.2s;}
.swatch:active{transform:scale(0.85);}
.swatch.active{border-color:white;transform:scale(1.18);box-shadow:0 0 12px rgba(255,255,255,0.4);}

/* ============ COMBAT MODE ============ */
#combatMode{display:none;flex-direction:column;width:100%;height:100%;padding:6px 14px;}
#combatMode.active{display:flex;}

.combat-header{display:flex;justify-content:space-between;align-items:center;padding-bottom:5px;border-bottom:1px solid var(--border);flex-shrink:0;}
.combat-title{font-family:'Orbitron',monospace;font-weight:900;font-size:clamp(12px,2.5vw,18px);color:var(--red);letter-spacing:4px;text-shadow:0 0 15px rgba(255,34,85,0.5);}
.header-right{display:flex;gap:8px;align-items:center;}
.btn-exit{font-family:'Share Tech Mono',monospace;font-size:clamp(8px,1.6vw,11px);color:var(--text2);background:transparent;border:1px solid var(--border);padding:4px 10px;border-radius:4px;cursor:pointer;letter-spacing:2px;transition:all 0.2s;}
.btn-exit:active{transform:scale(0.94);}

/* Round pips */
.round-indicators{display:flex;justify-content:center;gap:10px;padding:5px 0;flex-shrink:0;}
.round-pip{width:38px;height:7px;border-radius:4px;background:var(--border);transition:all 0.4s;}
.round-pip.done{background:var(--dim);}
.round-pip.active{background:var(--red);box-shadow:0 0 14px var(--red),0 0 28px rgba(255,34,85,0.3);}
.round-pip.pending{background:var(--border);}

.combat-main{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;min-height:0;}
.round-label{font-family:'Rajdhani',sans-serif;font-size:clamp(14px,3vw,22px);color:var(--text2);letter-spacing:5px;text-transform:uppercase;}

.combat-time{
  font-family:'Orbitron',monospace;font-weight:900;
  font-size:clamp(78px,25vw,210px);
  line-height:0.95;letter-spacing:3px;user-select:none;
  transition:color 0.3s,text-shadow 0.3s;
}
@media(orientation:landscape){.combat-time{font-size:clamp(78px,36vh,220px);}}
.combat-time.running{color:var(--accent);text-shadow:0 0 30px var(--glow),0 0 60px var(--dim-accent);}
.combat-time.warning{color:var(--amber);text-shadow:0 0 30px var(--amber-glow);animation:pulseAmber 0.5s ease-in-out infinite alternate;}
.combat-time.stopped{color:var(--red);text-shadow:0 0 30px rgba(255,34,85,0.5);}
.combat-time.idle{color:var(--dim);text-shadow:none;}

@keyframes pulseAmber{from{text-shadow:0 0 20px rgba(255,187,0,0.4);}to{text-shadow:0 0 55px rgba(255,187,0,0.9),0 0 100px rgba(255,187,0,0.3);}}

.timer-progress{width:88%;max-width:560px;height:5px;background:var(--border);border-radius:3px;overflow:hidden;}
.timer-fill{height:100%;border-radius:3px;transition:width 0.9s linear,background 0.3s;}

/* Config */
.config-panel{display:flex;justify-content:center;align-items:center;gap:32px;padding:6px 0;flex-wrap:wrap;flex-shrink:0;}
.config-group{display:flex;flex-direction:column;align-items:center;gap:3px;}
.config-label{font-size:clamp(11px,2.4vw,16px);color:var(--text2);letter-spacing:3px;text-transform:uppercase;}
.config-controls{display:flex;align-items:center;gap:14px;}
.cfg-btn{width:44px;height:44px;background:var(--panel2);border:1px solid var(--border2);border-radius:6px;color:var(--text);font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.15s;user-select:none;}
.cfg-btn:active{transform:scale(0.88);background:var(--border);}
.cfg-value{font-family:'Orbitron',monospace;font-weight:700;font-size:clamp(18px,4vw,30px);color:var(--accent);min-width:70px;text-align:center;text-shadow:0 0 15px var(--glow);transition:color 0.4s,text-shadow 0.4s;}

/* Controls */
.combat-controls{display:flex;justify-content:center;gap:12px;padding-top:5px;border-top:1px solid var(--border);flex-shrink:0;min-height:48px;padding-bottom:max(5px,env(safe-area-inset-bottom));}
.btn-main{font-family:'Orbitron',monospace;font-weight:700;font-size:clamp(10px,2.2vw,14px);letter-spacing:3px;border:none;padding:10px 22px;border-radius:5px;cursor:pointer;transition:all 0.15s;user-select:none;}
.btn-start{background:var(--accent);color:var(--bg);box-shadow:0 0 22px var(--glow);transition:background 0.4s,box-shadow 0.4s,color 0.4s;}
.btn-start:active{transform:scale(0.94);}
.btn-stop{background:var(--red);color:#fff;box-shadow:0 0 22px rgba(255,34,85,0.5);}
.btn-stop:active{transform:scale(0.94);}
.btn-reset{background:transparent;color:var(--text2);border:1px solid var(--border2)!important;}
.btn-reset:active{transform:scale(0.94);}
.btn-main:disabled{opacity:0.3;cursor:default;transform:none!important;}

/* Flash */
#flashOverlay{position:fixed;inset:0;background:white;opacity:0;pointer-events:none;z-index:9997;}
#flashOverlay.flash{animation:flashAnim 0.6s ease-out forwards;}
@keyframes flashAnim{0%{opacity:0.8}100%{opacity:0}}

/* Fullscreen button */
#btnFullscreen{position:fixed;top:6px;right:6px;z-index:5000;background:transparent;border:1px solid var(--border);color:var(--dim);font-size:15px;width:28px;height:28px;border-radius:4px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.2s;user-select:none;}
#btnFullscreen:active{transform:scale(0.9);}

/* Desktop */
@media(min-width:768px){
  #clockMode,#combatMode{max-width:900px;margin:0 auto;}
  .big-time{font-size:clamp(100px,18vw,250px);}
  .combat-time{font-size:clamp(100px,16vw,230px);}
}

/* Glow pulse on active */
@keyframes glowPulse{0%,100%{box-shadow:0 0 20px var(--glow);}50%{box-shadow:0 0 40px var(--glow),0 0 80px var(--dim-accent);}}
.btn-start{animation:glowPulse 2.5s ease-in-out infinite;}
</style>
</head>

let wakeLock=null;
async function requestWakeLock(){

}

function startRAF(){
  if(rafRunning)return;rafRunning=true;let last=0;
  function beat(ts){if(!rafRunning)return;if(ts-last>10000){last=ts;const d=document.getElementById('wakeIndicator');if(d){d.style.opacity='0.99';setTimeout(()=>{d.style.opacity='1';},50);}}requestAnimationFrame(beat);}
  requestAnimationFrame(beat);
}
function updateWakeUI(on){
  const el=document.getElementById('wakeIndicator'),tx=document.getElementById('wakeText');
  if(el)el.className='wake-indicator'+(on?' on':'');
  if(tx)tx.textContent=on?'AWAKE':'SLEEP';
}
let noSleepStarted=false;
function startAllNoSleep(){
  if(noSleepStarted)return;noSleepStarted=true;
  requestWakeLock();startNoSleepVideo();startRAF();updateWakeUI(true);
}
document.addEventListener('visibilitychange',()=>{
  if(document.visibilityState==='visible'){requestWakeLock();if(noSleepVideo&&noSleepVideo.paused)noSleepVideo.play().catch(()=>{});}
});

// ===== THEME =====
let themeOpen=false;
let currentTheme='theme-green';
function setTheme(name,el){
  document.body.className=name;currentTheme=name;
  document.querySelectorAll('.swatch').forEach(s=>s.classList.remove('active'));
  if(el)el.classList.add('active');
  setTimeout(()=>{themeOpen=false;document.getElementById('themePanel').classList.remove('open');},300);
}
function toggleThemePanel(){
  themeOpen=!themeOpen;
  document.getElementById('themePanel').classList.toggle('open',themeOpen);
}
document.addEventListener('click',e=>{
  if(themeOpen&&!e.target.closest('#themePanel')&&!e.target.closest('.btn-icon'))
    {themeOpen=false;document.getElementById('themePanel').classList.remove('open');}
});

// ===== STATE =====
let hourlyAlarm=false,lastHour=-1;
let roundDuration=180,totalRounds=3,currentRound=1; // roundDuration in seconds, step 30
let restDuration=60; // seconds
let timeLeft=0,timerInterval=null,isRunning=false,totalSeconds=0;
let inRestPhase=false;

// ===== CLOCK =====
function updateClock(){
  const now=new Date();
  const h=String(now.getHours()).padStart(2,'0');
  const m=String(now.getMinutes()).padStart(2,'0');
  const s=now.getSeconds();
  document.getElementById('bigTime').textContent=`${h}:${m}`;
  document.getElementById('secondsFill').style.width=`${(s/59)*100}%`;
  const days=['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
  const months=['ENE','FEB','MAR','ABR','MAY','JUN','JUL','AGO','SEP','OCT','NOV','DIC'];
  document.getElementById('dateDisplay').textContent=`${days[now.getDay()]} ${now.getDate()} ${months[now.getMonth()]} ${now.getFullYear()}`;
  const mm=String(now.getMonth()+1).padStart(2,'0');
  const dd=String(now.getDate()).padStart(2,'0');
  const efemEl=document.getElementById('efemText');
  const ef=efemerides[`${mm}-${dd}`];
  efemEl.className=ef?'efem-text':'efem-none';
  efemEl.textContent=ef||'Sin efemérides para hoy';
  if(hourlyAlarm&&now.getHours()!==lastHour&&now.getMinutes()===0&&s<3){lastHour=now.getHours();playHourlyBeep();}
}
function toggleHourly(){
  hourlyAlarm=!hourlyAlarm;
  document.getElementById('hourlyToggle').classList.toggle('active',hourlyAlarm);
}

// ===== AUDIO =====
const AudioCtx=window.AudioContext||window.webkitAudioContext;
let actx=null;
function getAudioCtx(){if(!actx)actx=new AudioCtx();return actx;}
function beep(freq,dur,type='square',vol=0.3){
  const ctx=getAudioCtx();
  const o=ctx.createOscillator(),g=ctx.createGain();
  o.connect(g);g.connect(ctx.destination);
  o.type=type;o.frequency.value=freq;
  g.gain.setValueAtTime(vol,ctx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+dur);
  o.start(ctx.currentTime);o.stop(ctx.currentTime+dur);
}
function playHourlyBeep(){
  setTimeout(()=>beep(880,0.15,'square',0.25),0);
  setTimeout(()=>beep(880,0.15,'square',0.25),200);
  setTimeout(()=>beep(1100,0.3,'sine',0.2),450);
}
function playRoundEnd(){
  [0,350,700].forEach(t=>setTimeout(()=>{beep(600,0.05,'square',0.4);setTimeout(()=>beep(900,0.4,'sine',0.35),50);},t));
  flash();
}
function playRestEnd(){
  beep(440,0.1,'square',0.3);
  setTimeout(()=>beep(660,0.3,'sine',0.3),150);
  setTimeout(()=>beep(880,0.4,'sine',0.3),350);
}
function playFight(){beep(440,0.1,'square',0.3);setTimeout(()=>beep(660,0.4,'sine',0.3),150);}
function playWarning(){beep(660,0.08,'square',0.2);}
function flash(){
  const el=document.getElementById('flashOverlay');
  el.classList.remove('flash');void el.offsetWidth;el.classList.add('flash');
}

// ===== COMBAT =====
function enterCombat(){
  document.getElementById('clockMode').style.display='none';
  const cm=document.getElementById('combatMode');
  cm.style.display='flex';cm.classList.add('active');
  resetCombat();
}
function exitCombat(){
  stopTimer();
  const cm=document.getElementById('combatMode');
  cm.classList.remove('active');cm.style.display='none';
  document.getElementById('clockMode').style.display='flex';
}

function buildRoundPips(){
  const cont=document.getElementById('roundIndicators');cont.innerHTML='';
  for(let i=1;i<=totalRounds;i++){
    const pip=document.createElement('div');
    pip.className='round-pip '+(i<currentRound?'done':i===currentRound?'active':'pending');
    pip.id=`pip-${i}`;cont.appendChild(pip);
  }
}
function updatePips(){
  for(let i=1;i<=totalRounds;i++){
    const pip=document.getElementById(`pip-${i}`);
    if(pip)pip.className='round-pip '+(i<currentRound?'done':i===currentRound?'active':'pending');
  }
}
function formatTime(sec){return `${Math.floor(sec/60)}:${String(sec%60).padStart(2,'0')}`;}

function updateCombatDisplay(){
  const el=document.getElementById('combatTime');
  el.textContent=formatTime(timeLeft);
  if(inRestPhase){
    el.className='combat-time warning';
    document.getElementById('roundLabel').textContent=`DESCANSO — ROUND ${currentRound+1} / ${totalRounds}`;
  } else {
    el.className='combat-time '+(!isRunning&&timeLeft===totalSeconds?'idle':!isRunning?'stopped':timeLeft<=10?'warning':'running');
    document.getElementById('roundLabel').textContent=`ROUND ${currentRound} / ${totalRounds}`;
  }
  const base=inRestPhase?restDuration:totalSeconds;
  const pct=base>0?(timeLeft/base)*100:100;
  const fill=document.getElementById('timerFill');
  fill.style.width=`${pct}%`;
  if(inRestPhase){fill.style.background='var(--amber)';fill.style.boxShadow='0 0 10px var(--amber)';}
  else{
    fill.style.background=(timeLeft<=10&&isRunning)?'var(--amber)':isRunning?'var(--accent)':'var(--dim)';
    fill.style.boxShadow=isRunning?`0 0 10px ${timeLeft<=10?'var(--amber)':'var(--accent)'}`:'none';
  }
  const btn=document.getElementById('btnStartStop');
  btn.textContent=isRunning?'⏸ PAUSA':(timeLeft<(inRestPhase?restDuration:totalSeconds)&&timeLeft>0?'▶ REANUDAR':'▶ START');
  btn.className='btn-main '+(isRunning?'btn-stop':'btn-start');
}

function startStop(){isRunning?stopTimer():startTimer();}
function startTimer(){
  if(timeLeft<=0)return;
  isRunning=true;
  if(!inRestPhase)playFight();
  updateCombatDisplay();
  timerInterval=setInterval(()=>{
    if(timeLeft>0){
      timeLeft--;
      if(timeLeft===10&&!inRestPhase)playWarning();
      updateCombatDisplay();
    } else {
      clearInterval(timerInterval);isRunning=false;
      if(!inRestPhase){
        // Round ended
        playRoundEnd();
        if(currentRound<totalRounds&&restDuration>0){
          // Start rest
          inRestPhase=true;timeLeft=restDuration;
          setTimeout(()=>{updateCombatDisplay();startTimer();},1500);
        } else if(currentRound<totalRounds){
          setTimeout(()=>{currentRound++;inRestPhase=false;timeLeft=totalSeconds;updatePips();updateCombatDisplay();},1500);
        } else {
          updateCombatDisplay();
          document.getElementById('roundLabel').textContent='¡COMBATE TERMINADO!';
        }
      } else {
        // Rest ended
        playRestEnd();
        currentRound++;inRestPhase=false;timeLeft=totalSeconds;
        updatePips();updateCombatDisplay();
        setTimeout(()=>{startTimer();},1000);
      }
    }
  },1000);
}
function stopTimer(){clearInterval(timerInterval);isRunning=false;updateCombatDisplay();}
function resetCombat(){
  stopTimer();currentRound=1;inRestPhase=false;
  totalSeconds=roundDuration;timeLeft=totalSeconds;
  buildRoundPips();updateCombatDisplay();updateConfigUI();
}
function changeTime(delta){
  if(isRunning)return;
  roundDuration=Math.max(30,Math.min(900,roundDuration+delta*30));
  totalSeconds=roundDuration;timeLeft=totalSeconds;inRestPhase=false;
  updateCombatDisplay();updateConfigUI();
}
function changeRounds(delta){
  if(isRunning)return;
  totalRounds=Math.max(1,Math.min(9,totalRounds+delta));
  resetCombat();
}
function changeRest(delta){
  if(isRunning)return;
  restDuration=Math.max(0,Math.min(180,restDuration+delta));
  updateConfigUI();
}
function fmtDuration(sec){
  const m=Math.floor(sec/60),s=sec%60;
  return s===0?m+':00':m+':'+String(s).padStart(2,'0');
}
function updateConfigUI(){
  document.getElementById('timeValue').textContent=fmtDuration(roundDuration);
  document.getElementById('roundValue').textContent=totalRounds;
  document.getElementById('restValue').textContent=restDuration>0?restDuration+'s':'OFF';
  document.getElementById('timeMinus').style.opacity=roundDuration<=30?'0.3':'1';
  document.getElementById('roundMinus').style.opacity=totalRounds<=1?'0.3':'1';
  document.getElementById('roundPlus').style.opacity=totalRounds>=9?'0.3':'1';
  document.getElementById('restMinus').style.opacity=restDuration<=0?'0.3':'1';
}

// ===== FULLSCREEN =====
function requestFullscreenNow(){
  const el=document.documentElement;
  const req=el.requestFullscreen||el.webkitRequestFullscreen||el.mozRequestFullScreen||el.msRequestFullscreen;
  if(req&&!document.fullscreenElement)req.call(el).catch(()=>{});
}
function toggleFullscreen(){
  if(!document.fullscreenElement){requestFullscreenNow();}
  else{const ex=document.exitFullscreen||document.webkitExitFullscreen||document.mozCancelFullScreen||document.msExitFullscreen;if(ex)ex.call(document).catch(()=>{});}
}
document.addEventListener('fullscreenchange',updateFsButton);
document.addEventListener('webkitfullscreenchange',updateFsButton);
function updateFsButton(){const btn=document.getElementById('btnFullscreen');btn.textContent=document.fullscreenElement?'✕':'⛶';}
function autoFullscreen(){requestFullscreenNow();startAllNoSleep();}
document.addEventListener('touchstart',autoFullscreen,{once:true});
document.addEventListener('click',autoFullscreen,{once:true});

// ===== INIT =====
requestWakeLock();
updateClock();
setInterval(updateClock,1000);
function firstTouch(){getAudioCtx();startAllNoSleep();}
document.addEventListener('touchstart',firstTouch,{once:true});
document.addEventListener('click',firstTouch,{once:true});
setInterval(()=>{if(!wakeLock)requestWakeLock();if(noSleepVideo&&noSleepVideo.paused)noSleepVideo.play().catch(()=>{});},20000);

if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{navigator.serviceWorker.register('sw.js').catch(()=>{});});
}
</script>
